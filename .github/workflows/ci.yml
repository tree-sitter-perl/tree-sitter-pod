name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    paths:
      - grammar.js
      - src/**
      - bindings/**
      - queries/**
      - test/**

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: tree-sitter/setup-action/cli@v2
      - run: tree-sitter generate
      - run: tree-sitter test
